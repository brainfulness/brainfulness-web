<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Preview iPhone — Brainfulness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: -apple-system, sans-serif;
    }
    h1 {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .phone {
      width: 393px;
      background: #000;
      border-radius: 54px;
      padding: 14px;
      box-shadow:
        0 0 0 2px #333,
        0 0 0 4px #1a1a1a,
        0 40px 80px rgba(0,0,0,0.7);
      position: relative;
    }
    .phone-notch {
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 0 0 20px 20px;
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .phone-screen {
      width: 100%;
      height: 780px;
      border-radius: 44px;
      overflow: hidden;
      background: #fff;
      position: relative;
    }
    iframe {
      width: 390px;
      height: 844px;
      border: none;
      transform: scale(0.924);
      transform-origin: top left;
      margin-left: -15px;
    }
    .label {
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Brainfulness · Vista iPhone 14 Pro</h1>
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <iframe src="index.html" title="Brainfulness"></iframe>
    </div>
  </div>
  <p class="label">Arrastra dentro del teléfono para hacer scroll</p>
</body>
</html>
